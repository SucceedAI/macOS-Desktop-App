name: SucceedAI-iOS
options:
  bundleIdPrefix: me.ph7
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"
settings:
  base:
    DEVELOPMENT_TEAM: 2V8LZ2444Y
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 9
    MARKETING_VERSION: 1.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
targets:
  SucceedAIiOS:
    type: application
    platform: iOS
    sources:
      - path: App
      - path: Shared
      - path: Keyboard/KeyboardViewModel.swift
      - path: Assets.xcassets
        buildPhase: resources
      - path: ../Succeed AI/AIProvideable.swift
      - path: ../Succeed AI/LocalFoundationModelProvider.swift
      - path: ../Succeed AI/SucceedAITextIntent.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.Succeed-AI
        PRODUCT_NAME: SucceedAI
        CODE_SIGN_ENTITLEMENTS: App/SucceedAIiOS.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: Succeed AI
        INFOPLIST_KEY_CFBundleIconName: AppIcon
        INFOPLIST_KEY_ITSAppUsesNonExemptEncryption: NO
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.productivity
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - target: SucceedAIKeyboard
        embed: true
    scheme:
      testTargets:
        - SucceedAIiOSTests
  SucceedAIKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: Keyboard
      - path: Shared
      - path: ../Succeed AI/AIProvideable.swift
      - path: ../Succeed AI/LocalFoundationModelProvider.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.Succeed-AI.Keyboard
        PRODUCT_NAME: SucceedAIKeyboard
        CODE_SIGN_ENTITLEMENTS: Keyboard/SucceedAIKeyboard.entitlements
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_CFBundleDisplayName: SucceedAI Keyboard
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES
    info:
      path: Keyboard/Info.plist
      properties:
        CFBundleDisplayName: SucceedAI Keyboard
        NSExtension:
          NSExtensionPointIdentifier: com.apple.keyboard-service
          NSExtensionPrincipalClass: "$(PRODUCT_MODULE_NAME).KeyboardViewController"
          NSExtensionAttributes:
            IsASCIICapable: true
            PrefersRightToLeft: false
            PrimaryLanguage: en-US
            RequestsOpenAccess: false
  SucceedAIiOSTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests
    dependencies:
      - target: SucceedAIiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.Succeed-AI.Tests
        GENERATE_INFOPLIST_FILE: YES
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/SucceedAI.app/SucceedAI"
        BUNDLE_LOADER: "$(TEST_HOST)"
  SucceedAIiOSUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: UITests
    dependencies:
      - target: SucceedAIiOS
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: me.ph7.Succeed-AI.UITests
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SucceedAIiOS
schemes:
  SucceedAIiOS:
    build:
      targets:
        SucceedAIiOS: all
        SucceedAIKeyboard: all
    test:
      targets:
        - SucceedAIiOSTests
    run:
      config: Debug
    archive:
      config: Release
  SucceedAIKeyboardRuntime:
    build:
      targets:
        SucceedAIiOS: all
        SucceedAIKeyboard: all
        SucceedAIiOSUITests: [test]
    test:
      targets:
        - SucceedAIiOSUITests
